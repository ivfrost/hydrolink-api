services:
  postgres:
    image: postgres:16
    container_name: postgres_dev
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hydrodb-dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - hydro-network

  redis:
    image: redis:7-alpine
    container_name: redis_dev
    command: redis-server --loglevel verbose
    ports:
      - '6379:6379'
    volumes:
      - cache:/data
    networks:
      - hydro-network

  nanomq:
    image: emqx/nanomq:latest
    container_name: nanomq_dev
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8883:8883"
      - "8083:8083"
    volumes:
      - ./nanomq.conf:/usr/local/nanomq/nanomq.conf
      - ./mqtt_public_key.pem:/etc/mqtt_public_key.pem
    networks:
      - hydro-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq_dev
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - '5672:5672'
      - '15672:15672'
    networks:
      - hydro-network

volumes:
  pgdata:
  cache:

networks:
  hydro-network:
    driver: bridge
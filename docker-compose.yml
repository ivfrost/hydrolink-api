services:
  postgres:
    image: postgres:16
    container_name: postgres_dev
    restart: on-failure:3
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}" ]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hydro-network

  redis:
    image: redis:7-alpine
    container_name: redis_dev
    restart: on-failure:3
    command: redis-server --loglevel verbose --port ${REDIS_PORT}
    ports:
      - '6379:6379'
    volumes:
      - cache:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hydro-network

  nanomq:
    image: emqx/nanomq:latest
    container_name: nanomq_dev
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8883:8883"
      - "8083:8083"
    volumes:
      - ./nanomq.conf:/usr/local/nanomq/nanomq.prod.conf
      - ./mqtt_public_key.pem:/etc/mqtt_public_key.pem
    networks:
      - hydro-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
  cache:

networks:
  hydro-network:
    driver: bridge
services:
  api:
    build:
      context: .
      target: production
    restart: on-failure:3
    ports:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nanomq:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-stage}
      JWT_SECRET: ${JWT_SECRET:-${SERVICE_HEX_32_1}}
      RECOVERY_SECRET: ${RECOVERY_SECRET:-${SERVICE_HEX_32_2}}
      DEVICE_SECRET: ${DEVICE_SECRET:-${SERVICE_HEX_32_3}}
      MQTT_PRIVATE_KEY_B64: ${MQTT_PRIVATE_KEY_B64:?}
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-tcp://nanomq:1883}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-hydro-api}
      MQTT_USERNAME: ${MQTT_USERNAME:-hydro-api-user}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-${SERVICE_HEX_32_4}}
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/hydrodb-stage}
      DB_USERNAME: ${DB_USERNAME:-hydro}
      DB_PASSWORD: ${DB_PASSWORD:-${SERVICE_HEX_32_5}}
      REDIS_HOST: ${REDIS_HOST:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-${SERVICE_HEX_32_6}}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-hydro}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-${SERVICE_HEX_32_7}}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://hydro.netoasis.dedyn.io}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@hydro.netoasis.dedyn.io}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-${SERVICE_HEX_32_8}}
      SEED_API_MQTT_USERNAME: ${MQTT_USERNAME:-hydro-api-user}
      SEED_API_MQTT_PASSWORD: ${MQTT_PASSWORD:-${SERVICE_HEX_32_8}}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-2592000000}
      JWT_ACCESS_EXPIRATION_MS: ${JWT_ACCESS_EXPIRATION_MS:-900000}
      JWT_ISSUER: ${JWT_ISSUER:-hydro-api}
    networks:
      hydro-network-stage:
        aliases:
          - api
    deploy:
      resources:
        limits:
          memory: 512m

  postgres:
    image: postgres:16
    restart: on-failure:3
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-hydrodb-stage}
    volumes:
      - pgdata-stage:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME}" ]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hydro-network-stage

  redis:
    image: redis:7-alpine
    restart: on-failure:3
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - cache-stage:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hydro-network-stage

  nanomq:
    build:
      context: .
      dockerfile: Dockerfile.nanomq
    environment:
      NANOMQ_CONF_PATH: /etc/nanomq/nanomq.conf
    restart: on-failure:3
    ports:
      - "1883:1883"
    healthcheck:
      test: [ "CMD", "nc", "-z", "127.0.0.1", "1883" ]
      start_period: 15s
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - hydro-network-stage

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: on-failure:3
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-stage:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hydro-network-stage

volumes:
  pgdata-stage:
  cache-stage:
  rabbitmq-stage:

networks:
  hydro-network-stage:
    driver: bridge
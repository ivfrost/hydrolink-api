server.port=8080
spring.main.banner-mode=off

# --- HashiCorp Vault (provides db credentials, jwt.secret and recovery.secret) ---
spring.cloud.vault.enabled=true
spring.cloud.vault.uri=${VAULT_URI}
spring.cloud.vault.authentication=approle
spring.cloud.vault.app-role.role=${VAULT_ROLE}
spring.cloud.vault.kv.backend=secret
spring.cloud.vault.kv.default-context=hydro-api
spring.cloud.vault.app-role.role-id=${VAULT_ROLE_ID}
spring.cloud.vault.app-role.secret-id=${VAULT_SECRET_ID}
spring.config.import=vault://

# --- Secrets (no defaults — fail fast if missing) ---
jwt.secret=${JWT_SECRET}
recovery.secret=${RECOVERY_SECRET}
device.secret=${DEVICE_SECRET}
mqtt.jwt.private.key.b64=${MQTT_PRIVATE_KEY_B64}

# --- MQTT ---
mqtt.broker.url=${MQTT_BROKER_URL}
mqtt.topic.wildcard=hydro/+/status
mqtt.jwt.expiration.ms=600000
api.mqtt.client.id=${API_MQTT_CLIENT_ID}
api.mqtt.username=${API_MQTT_USERNAME}
api.mqtt.password=${API_MQTT_PASSWORD}
jwt.refresh.expiration.ms=${JWT_REFRESH_EXPIRATION_MS:2592000000}
jwt.access.expiration.ms=${JWT_ACCESS_EXPIRATION_MS:900000}
jwt.auth.token.issuer=${JWT_ISSUER:hydro-api}

# --- Database ---
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.show-sql=false
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.defer-datasource-initialization=false
spring.flyway.enabled=true

# --- Redis ---
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.ssl.enabled=false
spring.data.redis.password=${REDIS_PASSWORD}
spring.cache.redis.time-to-live=10m
cache.last-seen.expiration.ms=30000

# --- Hibernate ---
spring.autoconfigure.exclude=\
  org.springframework.modulith.runtime.autoconfigure.SpringModulithRuntimeAutoConfiguration,\
  org.springframework.modulith.actuator.autoconfigure.ApplicationModulesEndpointConfiguration
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.properties.hibernate.implicit_naming_strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl

# --- RabbitMQ ---
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# --- Modulith ---
spring.modulith.runtime.verification-enabled=false
spring.modulith.events.republish-outstanding-events-on-restart=true
spring.modulith.events.jdbc.schema-initialization.enabled=true

# --- Proxy / Reverse proxy awareness ---
server.forward-headers-strategy=framework

# --- CORS ---
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# --- Blob storage ---
features.blob-storage.enabled=${FEATURE_BLOB_STORAGE_ENABLED:false}

# --- SwaggerUI (disabled in prod) ---
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# --- Logging ---
logging.level.org.springframework=ERROR
logging.level.org.springframework.web=WARN
logging.level.dev.ivfrost.hydro_backend=INFO